name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##refs/tags/}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [version]
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [mipsel-3.4, mips-3.4, aarch64-3.10]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          node scripts/generate-brand-icons.mjs
          git diff --exit-code src/lib/generated/brandIcons.ts \
            || { echo "::error::brandIcons.ts is stale — run 'node scripts/generate-brand-icons.mjs' and commit"; exit 1; }
          npm run build

      - name: Build .ipk
        env:
          IPK_VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "$IPK_VERSION" > dist/VERSION
          SKIP_FRONTEND_BUILD=1 ./scripts/build-ipk.sh "$IPK_VERSION" "${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ipk-${{ matrix.arch }}
          path: dist/awg-manager_*_${{ matrix.arch }}-kn.ipk
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4
      - run: go test ./...
      - working-directory: frontend
        run: |
          npm ci
          npx vitest run

  catalog-drift:
    name: Preset catalog drift-check
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4
      - name: Host sing-box (pinned RequiredVersion)
        shell: bash
        run: |
          set -euo pipefail
          ver="$(sed -n 's/^const RequiredVersion = "\(.*\)"/\1/p' internal/singbox/installer/embedded.go)"
          curl -fsSL -o /tmp/sb.tgz "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-linux-amd64.tar.gz"
          tar -xzf /tmp/sb.tgz -C /tmp
          echo "SB=$(find /tmp -type f -name sing-box -path "*${ver}-linux-amd64*" | head -1)" >> "$GITHUB_ENV"
      - name: Regenerate + assert no drift
        shell: bash
        run: |
          set -euo pipefail
          go run ./tools/genpresets -singbox "$SB"
          git diff --exit-code internal/presets/defaults.json \
            || { echo "::error::defaults.json is stale vs the pinned .srs — run 'go run ./tools/genpresets -singbox <sb>' and commit"; exit 1; }

  publish:
    name: Publish stable release
    runs-on: ubuntu-latest
    needs: [version, build, test, catalog-drift]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Download all .ipk
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ipk-*
          path: dist
          merge-multiple: true
      - name: Extract changelog section
        env:
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          awk -v hdr="## [$VERSION] - " '
            index($0, hdr) == 1     { capture=1; next }
            capture && index($0, "## [") == 1 { exit }
            capture                  { print }
          ' CHANGELOG.md | sed -E '1{/^$/d;}' | sed -E '${/^$/d;}' > /tmp/notes.md
          if [[ ! -s /tmp/notes.md ]]; then
            echo "No CHANGELOG section for $VERSION" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Auto-detect prerelease by suffix (rc/alpha/beta/dev).
          extra=()
          if [[ "$TAG" =~ -(rc|beta|alpha|dev) ]]; then
            extra+=(--prerelease)
          fi
          gh release create "$TAG" \
            ./dist/awg-manager_*.ipk \
            CHANGELOG.md VERSION \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            "${extra[@]}"
