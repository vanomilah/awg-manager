name: "Build"
on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: ./scripts/build-frontend.sh

      - name: Upload frontend build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: frontend-build
          path: frontend/build
          if-no-files-found: error

  version:
    name: Resolve IPK version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ipk_version: ${{ steps.resolve.outputs.ipk_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve revision for current patch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          REV=1
          PREV=""

          mkdir -p /tmp/prev-release
          if gh release download latest --dir /tmp/prev-release --pattern VERSION 2>/dev/null \
            && [[ -f /tmp/prev-release/VERSION ]]; then
            PREV="$(tr -d '[:space:]' < /tmp/prev-release/VERSION)"
            esc="${VERSION//./\\.}"
            if [[ "$PREV" =~ ^${esc}\+r([0-9]+)$ ]]; then
              REV=$((BASH_REMATCH[1] + 1))
            fi
          fi

          IPK_VERSION="${VERSION}+r${REV}"
          echo "Resolved ${IPK_VERSION} (previous: ${PREV:-none})"
          echo "ipk_version=${IPK_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - frontend
      - version
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        arch:
          - mipsel-3.4
          - mips-3.4
          - aarch64-3.10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Load sing-box version
        shell: bash
        run: |
          set -euo pipefail
          v="$(sed -n 's/^const RequiredVersion = "\(.*\)"/\1/p' internal/singbox/installer/embedded.go)"
          echo "SINGBOX_VERSION=$v" >> "$GITHUB_ENV"
          echo "SINGBOX_REF=v$v" >> "$GITHUB_ENV"

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: frontend-build
          path: frontend/build

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ca-certificates gnupg curl file xz-utils unzip zip python3 python3-requests procps \
            build-essential pkg-config

      - name: Restore sing-box build artifacts
        id: singbox-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          # Cache holds ONLY the built binary + its sha256 sidecar. embedded.go
          # is NOT cached and NOT hashed into the key: it is a build output
          # (per-arch URL/SHA256/Size) regenerated unconditionally from the
          # binary by the "Refresh sing-box embedded metadata" step below, so it
          # is always fresh whether the binary was rebuilt or restored.
          key: sing-box-${{ matrix.arch }}-${{ env.SINGBOX_VERSION }}-${{ env.SINGBOX_REF }}-repo-${{ hashFiles('scripts/build-singbox.sh', 'scripts/patches/**') }}
          path: |
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}.sha256

      - name: Build sing-box
        if: steps.singbox-cache.outputs.cache-hit != 'true'
        env:
          RELEASE_BASE_URL: http://repo.hoaxisr.ru/develop/singbox/${{ env.SINGBOX_VERSION }}
        run: |
          set -euo pipefail

          ./scripts/build-singbox.sh "${{ matrix.arch }}"

      - name: Save sing-box build artifacts
        if: steps.singbox-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          # Key + path MUST match the restore step above (see its comment).
          key: sing-box-${{ matrix.arch }}-${{ env.SINGBOX_VERSION }}-${{ env.SINGBOX_REF }}-repo-${{ hashFiles('scripts/build-singbox.sh', 'scripts/patches/**') }}
          path: |
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}.sha256

      - name: Refresh sing-box embedded metadata
        # Unconditional: on a cache hit "Build sing-box" is skipped, but
        # embedded.go must still carry the correct URL/SHA256/Size for the
        # restored binary so the router updater downloads the right file.
        env:
          RELEASE_BASE_URL: http://repo.hoaxisr.ru/develop/singbox/${{ env.SINGBOX_VERSION }}
        run: |
          set -euo pipefail

          ./scripts/update-singbox-embedded.sh "${{ matrix.arch }}" "$SINGBOX_VERSION"

      - name: Build
        id: build
        run: |
          set -euo pipefail

          file="dist/sing-box-${SINGBOX_VERSION}-${{ matrix.arch }}"
          if [[ ! -f "$file" ]]; then
            echo "Missing sing-box binary: $file" >&2
            exit 1
          fi

          IPK_VERSION="${{ needs.version.outputs.ipk_version }}"
          printf '%s\n' "$IPK_VERSION" > dist/VERSION

          SKIP_FRONTEND_BUILD=1 ./scripts/build-ipk.sh "$IPK_VERSION" "${{ matrix.arch }}"

      - name: Upload result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: result-${{ matrix.arch }}
          path: |
            dist/awg-manager_*_${{ matrix.arch }}-kn.ipk
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}.sha256
            dist/VERSION
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Run go tests with backend coverage
        shell: bash
        run: |
          set -euo pipefail

          go test -count=1 \
            -covermode=atomic \
            -coverpkg=./internal/...,./cmd/... \
            -coverprofile=coverage.out \
            ./...

          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload backend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: backend-coverage
          path: |
            coverage.out
            coverage.txt
            coverage.html
          if-no-files-found: error

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - version

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download build results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: result-*
          path: dist
          merge-multiple: true

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Generate develop changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IPK_VERSION: ${{ needs.version.outputs.ipk_version }}
          EVENT_BEFORE: ${{ github.event.before }}
        shell: bash
        run: |
          set -euo pipefail

          go build -o /tmp/changelog-gen ./cmd/changelog-gen

          mkdir -p /tmp/prevcl
          gh release download latest --dir /tmp/prevcl \
            --pattern CHANGELOG.md --pattern RELEASED_SHA 2>/dev/null || true

          START=""
          if [[ -f /tmp/prevcl/RELEASED_SHA ]]; then
            START="$(tr -d '[:space:]' < /tmp/prevcl/RELEASED_SHA)"
          fi
          if [[ -z "$START" ]] || ! git cat-file -e "${START}^{commit}" 2>/dev/null; then
            START="$EVENT_BEFORE"
          fi
          if [[ -z "$START" ]] || [[ "$START" =~ ^0+$ ]] || ! git cat-file -e "${START}^{commit}" 2>/dev/null; then
            START="${GITHUB_SHA}~1"
          fi

          echo "changelog range: ${START}..${GITHUB_SHA}"
          git log --format='%s' "${START}..${GITHUB_SHA}" \
            | /tmp/changelog-gen --version "$IPK_VERSION" --date "$(date +%F)" > /tmp/delta.md

          PREV=/tmp/prevcl/CHANGELOG.md
          [[ -f "$PREV" ]] || PREV=/dev/null
          if [[ -s /tmp/delta.md ]]; then
            cat /tmp/delta.md "$PREV" > dist/CHANGELOG.md
          else
            cat "$PREV" > dist/CHANGELOG.md
          fi
          printf '%s\n' "$GITHUB_SHA" > dist/RELEASED_SHA
          echo "=== dist/CHANGELOG.md (head) ==="; head -20 dist/CHANGELOG.md || true

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(./dist/awg-manager_* ./dist/sing-box-* ./dist/VERSION ./dist/CHANGELOG.md ./dist/RELEASED_SHA)

          if (( ${#files[@]} == 0 )); then
            echo "No release files found in ./dist"
            exit 1
          fi

          gh release delete latest --yes --cleanup-tag || true

          PREV_TAG=$(gh release list --limit 10 --json tagName --jq '[.[] | select(.tagName != "latest")] | .[0].tagName' 2>/dev/null)

          EXTRA_FLAGS=()
          if [ -n "${PREV_TAG}" ]; then
            EXTRA_FLAGS+=("--notes-start-tag" "${PREV_TAG}")
          fi

          gh release create latest "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Development build" \
            --generate-notes \
            "${EXTRA_FLAGS[@]}" \
            --prerelease
