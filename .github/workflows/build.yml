name: "Build"
on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache result
        uses: actions/cache@v4
        with:
          key: result-${{ github.sha }}
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.9

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ca-certificates gnupg curl file xz-utils unzip zip python3 python3-requests procps \
            build-essential pkg-config

          go install golang.org/dl/go1.23.12@latest
          go1.23.12 download

      - name: Build
        id: build
        run: |
          set -euo pipefail

          ./scripts/build-singbox.sh mipsel-3.4 1.14.0-alpha.21
          ./scripts/build-singbox.sh mips-3.4 1.14.0-alpha.21
          ./scripts/build-singbox.sh aarch64-3.10 1.14.0-alpha.21

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          IPK_VERSION="$(cat VERSION)+r${BUILD_NUMBER}"
          printf '%s\n' "$IPK_VERSION" > dist/VERSION

          ./scripts/build-ipk.sh "$IPK_VERSION" mipsel-3.4
          ./scripts/build-ipk.sh "$IPK_VERSION" mips-3.4
          ./scripts/build-ipk.sh "$IPK_VERSION" aarch64-3.10

  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          key: result-${{ github.sha }}
          path: dist
          fail-on-cache-miss: true

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(./dist/awg-manager_* ./dist/sing-box-* ./dist/VERSION)

          if (( ${#files[@]} == 0 )); then
            echo "No release files found in ./dist"
            exit 1
          fi

          gh release delete latest --yes --cleanup-tag || true
          gh release create latest "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Development build" \
            --generate-notes \
            --prerelease
