name: "Build"
on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SINGBOX_VERSION: 1.14.0-alpha.25
  SINGBOX_REF: v1.14.0-alpha.25

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: ./scripts/build-frontend.sh

      - name: Upload frontend build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: frontend-build
          path: frontend/build
          if-no-files-found: error

  version:
    name: Resolve IPK version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ipk_version: ${{ steps.resolve.outputs.ipk_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve revision for current patch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          REV=1
          PREV=""

          mkdir -p /tmp/prev-release
          if gh release download latest --dir /tmp/prev-release --pattern VERSION 2>/dev/null \
            && [[ -f /tmp/prev-release/VERSION ]]; then
            PREV="$(tr -d '[:space:]' < /tmp/prev-release/VERSION)"
            esc="${VERSION//./\\.}"
            if [[ "$PREV" =~ ^${esc}\+r([0-9]+)$ ]]; then
              REV=$((BASH_REMATCH[1] + 1))
            fi
          fi

          IPK_VERSION="${VERSION}+r${REV}"
          echo "Resolved ${IPK_VERSION} (previous: ${PREV:-none})"
          echo "ipk_version=${IPK_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - frontend
      - version
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        arch:
          - mipsel-3.4
          - mips-3.4
          - aarch64-3.10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download frontend build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: frontend-build
          path: frontend/build

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.25.10

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git ca-certificates gnupg curl file xz-utils unzip zip python3 python3-requests procps \
            build-essential pkg-config

          go install golang.org/dl/go1.23.12@latest
          go1.23.12 download

      - name: Restore sing-box build artifacts
        id: singbox-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          key: sing-box-${{ matrix.arch }}-${{ env.SINGBOX_VERSION }}-${{ env.SINGBOX_REF }}-${{ hashFiles('scripts/build-singbox.sh', 'scripts/patches/**') }}
          path: |
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            internal/singbox/installer/embedded.go

      - name: Build sing-box
        if: steps.singbox-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          ./scripts/build-singbox.sh "${{ matrix.arch }}"

      - name: Save sing-box build artifacts
        if: steps.singbox-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          key: sing-box-${{ matrix.arch }}-${{ env.SINGBOX_VERSION }}-${{ env.SINGBOX_REF }}-${{ hashFiles('scripts/build-singbox.sh', 'scripts/patches/**') }}
          path: |
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            internal/singbox/installer/embedded.go

      - name: Build
        id: build
        run: |
          set -euo pipefail

          file="dist/sing-box-${SINGBOX_VERSION}-${{ matrix.arch }}"
          if [[ ! -f "$file" ]]; then
            echo "Missing sing-box binary: $file" >&2
            exit 1
          fi

          required_version="$(sed -n 's/^const RequiredVersion = "\(.*\)"/\1/p' internal/singbox/installer/embedded.go)"
          if [[ "$required_version" != "$SINGBOX_VERSION" ]]; then
            echo "embedded.go RequiredVersion is $required_version, want $SINGBOX_VERSION" >&2
            exit 1
          fi

          IPK_VERSION="${{ needs.version.outputs.ipk_version }}"
          printf '%s\n' "$IPK_VERSION" > dist/VERSION

          SKIP_FRONTEND_BUILD=1 ./scripts/build-ipk.sh "$IPK_VERSION" "${{ matrix.arch }}"

      - name: Upload result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: result-${{ matrix.arch }}
          path: |
            dist/awg-manager_*_${{ matrix.arch }}-kn.ipk
            dist/sing-box-${{ env.SINGBOX_VERSION }}-${{ matrix.arch }}
            dist/VERSION
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.25.10

      - name: Run go tests
        run: go test ./...

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest
    needs:
      - build
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download build results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: result-*
          path: dist
          merge-multiple: true

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(./dist/awg-manager_* ./dist/sing-box-* ./dist/VERSION)

          if (( ${#files[@]} == 0 )); then
            echo "No release files found in ./dist"
            exit 1
          fi

          gh release delete latest --yes --cleanup-tag || true

          PREV_TAG=$(gh release list --limit 10 --json tagName --jq '[.[] | select(.tagName != "latest")] | .[0].tagName' 2>/dev/null)

          EXTRA_FLAGS=()
          if [ -n "${PREV_TAG}" ]; then
            EXTRA_FLAGS+=("--notes-start-tag" "${PREV_TAG}")
          fi

          gh release create latest "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Development build" \
            --generate-notes \
            "${EXTRA_FLAGS[@]}" \
            --prerelease
