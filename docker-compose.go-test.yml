# Локальный Linux-раннер для backend Go-тестов.
#
# Постоянный контейнер (кэши go-build / go-mod между запусками):
#   docker compose -f docker-compose.go-test.yml up -d runner
#   docker compose -f docker-compose.go-test.yml exec runner go test -count=1 ./internal/managed
#   docker compose -f docker-compose.go-test.yml down
#
# Одноразовый прогон:
#   docker compose -f docker-compose.go-test.yml run --rm test ./internal/managed
#   docker compose -f docker-compose.go-test.yml run --rm test ./... -run TestFoo

services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile.go-test
    image: awgm-go-test:latest
    container_name: awgm-go-test-runner
    working_dir: /src
    volumes:
      - .:/src
      - ./.cache/docker-go-test/go-build:/go-build-cache
      - ./.cache/docker-go-test/go-mod:/go/pkg/mod
    environment:
      GOCACHE: /go-build-cache
      GOMODCACHE: /go/pkg/mod
    entrypoint: []
    command: sleep infinity
    tty: true
    stdin_open: true

  test:
    build:
      context: .
      dockerfile: Dockerfile.go-test
    image: awgm-go-test:latest
    working_dir: /src
    volumes:
      - .:/src
      - ./.cache/docker-go-test/go-build:/go-build-cache
      - ./.cache/docker-go-test/go-mod:/go/pkg/mod
    environment:
      GOCACHE: /go-build-cache
      GOMODCACHE: /go/pkg/mod
    profiles:
      - oneshot
