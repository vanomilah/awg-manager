info:
  contact: {}
  description: HTTP API for the AWG Manager daemon (tunnels, routing, system).
  title: AWG Manager API
  version: "1.0"
paths:
  /access-policies:
    get:
      description: KeeneticOS 5 only when route is registered.
      parameters:
      - description: Pass 'true' to bypass NDMS cache
        in: query
        name: refresh
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AccessPoliciesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: List access policies
      tags:
      - access-policy
  /access-policies/assign:
    delete:
      description: Removes the policy binding for the LAN device identified by MAC.
        The device falls back to the default policy.
      parameters:
      - description: Device MAC address
        in: query
        name: mac
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Unassign device from policy
      tags:
      - access-policy
    post:
      consumes:
      - application/json
      description: Binds the LAN device identified by MAC to the named policy. Replaces
        any existing assignment.
      parameters:
      - description: Device MAC + target policy name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.AssignDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Assign device to policy
      tags:
      - access-policy
  /access-policies/create:
    post:
      consumes:
      - application/json
      parameters:
      - description: Policy description
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateAccessPolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AccessPolicyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Create access policy
      tags:
      - access-policy
  /access-policies/delete:
    delete:
      description: Removes the named access policy. Bound LAN devices revert to the
        default policy.
      parameters:
      - description: Policy name (e.g. Policy0)
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Delete access policy
      tags:
      - access-policy
  /access-policies/description:
    post:
      consumes:
      - application/json
      parameters:
      - description: Policy name + new description
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SetDescriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.OkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Set access policy description
      tags:
      - access-policy
  /access-policies/devices:
    get:
      parameters:
      - description: Pass 'true' to bypass NDMS cache
        in: query
        name: refresh
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.PolicyDevicesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: List policy devices
      tags:
      - access-policy
  /access-policies/interface-up:
    post:
      consumes:
