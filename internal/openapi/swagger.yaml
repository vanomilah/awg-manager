  /singbox/subscriptions/get-stream:
    get:
      description: 'Streams a subscription as Server-Sent Events: one `meta` event
        with subscription header (incl. total member count), then one `member` event
        per server member, then a `done` event with finalisation (orphans, active
        member). Frontend uses this to show a progress bar and render cards as they
        arrive instead of waiting for the full payload. Service.Get is itself sync;
        the streaming is the handler''s contract — it writes events with Flush() between,
        so TCP + browser deliver progressively.'
      parameters:
      - description: Subscription id
        in: query
        name: id
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: 'Stream of SSE events: meta, member×N, done'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIErrorEnvelope'
      security:
      - CookieAuth: []
      summary: Stream subscription details progressively (SSE)
      tags:
      - subscriptions
